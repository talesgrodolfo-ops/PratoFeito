<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>


    <link rel="stylesheet" href="./css/inicio.css">

    <link rel="stylesheet" href="./css/style.css">


    <script src="./scripts/full-screen.js" defer></script>

    <script src="./script.js" defer></script>

    <link rel="icon" href="./img/logo-certa-.ico" type="image/x-ico">
    <title>Prato Feito</title>

</head>

<body>

    <div id="container">
        <img src="./img/logo.png" alt="">

        <div id="buttons">
            <button id="tutorial" type="button">Como jogar</button>
            <button onclick="proximap()" id="comecar" type="button">Começar</button>
        </div>
    </div>

    <div id="trocarblock" style="display: none;">
        <div id="game">

            <div id="prod">
                <p id="nome"></p>
                <p id="peso"></p>
            </div>

            <div id="controls">
                <button id="menos" type="button" onclick="menos()">-</button>
                <button id="salvarLista" type="submit" onclick="AdicionarAlimento()">Adicionar alimento ao prato</button>
                <button id="salvarLista" type="submit" onclick="salvar()">Analisar</button>
                <button id="mais" onclick="mais()" type="button">+</button>
            </div>
        </div>

        <a-scene mindar-image="imageTargetSrc: ./mind/targets.mind; maxTrack: 10; uiScanning: false; uiLoading: false"
            vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true id=scene">
            <a-assets id="assets"></a-assets>
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        </a-scene>
    </div>

</body>

</html>
